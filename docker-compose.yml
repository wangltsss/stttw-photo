services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: photos
      POSTGRES_PASSWORD: photos
      POSTGRES_DB: photos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
